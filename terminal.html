<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Aurex Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #c0392b;
    --red-dim: #8b1a12;
    --red-glow: #e74c3c;
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #2a0d09;
    --text: #e8e0dc;
    --text-muted: #6b5a57;
    --header-h: 44px;
    --keys-h: 52px;
    --drawer-w: 280px;
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ── HEADER ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    padding: 0 12px;
    box-shadow: 0 2px 12px rgba(192,57,43,0.15);
  }

  #hamburger {
    background: none; border: none;
    width: 36px; height: 36px;
    display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
    cursor: pointer; border-radius: 6px;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #hamburger:active { background: var(--border); }
  #hamburger span {
    display: block; width: 20px; height: 2px;
    background: var(--red-glow);
    border-radius: 2px;
    transition: transform 0.25s, opacity 0.25s;
  }
  #hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  #hamburger.open span:nth-child(2) { opacity: 0; }
  #hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  #header-title {
    flex: 1;
    font-size: 13px; font-weight: 700; letter-spacing: 2px;
    color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #header-title span { color: var(--red-glow); }

  #conn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #3a3a3a;
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  #conn-dot.connected { background: #2ecc71; box-shadow: 0 0 6px #2ecc71; }
  #conn-dot.error     { background: var(--red); box-shadow: 0 0 6px var(--red); }

  #session-badge {
    font-size: 10px; color: var(--text-muted);
    background: var(--border);
    padding: 2px 7px; border-radius: 10px;
    flex-shrink: 0;
    max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── DRAWER OVERLAY ── */
  #overlay {
    position: fixed; inset: 0; z-index: 199;
    background: rgba(0,0,0,0.6);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  #overlay.show { opacity: 1; pointer-events: all; }

  /* ── DRAWER ── */
  #drawer {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
    width: var(--drawer-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #drawer.open { transform: translateX(0); }

  #drawer-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    background: #0d0d0d;
  }
  #drawer-header h2 {
    font-size: 11px; font-weight: 700; letter-spacing: 3px;
    color: var(--red-glow); text-transform: uppercase;
    margin-bottom: 2px;
  }
  #drawer-header p { font-size: 10px; color: var(--text-muted); }

  .drawer-section {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }
  .drawer-section-label {
    font-size: 9px; font-weight: 700; letter-spacing: 2px;
    color: var(--text-muted); text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* New session input */
  .input-row {
    display: flex; gap: 6px;
  }
  #new-session-name {
    flex: 1; background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 12px;
    padding: 6px 10px; outline: none;
    transition: border-color 0.2s;
  }
  #new-session-name:focus { border-color: var(--red-dim); }
  #new-session-name::placeholder { color: var(--text-muted); }

  .btn {
    background: var(--red-dim); border: 1px solid var(--red);
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px;
    font-weight: 600; padding: 6px 10px; border-radius: 5px;
    cursor: pointer; transition: background 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
  .btn:active { background: var(--red); box-shadow: 0 0 8px rgba(192,57,43,0.4); }
  .btn.ghost {
    background: transparent; border-color: var(--border); color: var(--text-muted);
  }
  .btn.ghost:active { background: var(--border); color: var(--text); }
  .btn.danger { border-color: #7a1a1a; color: #e57373; }
  .btn.danger:active { background: #5a0a0a; }

  /* Session list */
  #session-list { display: flex; flex-direction: column; gap: 4px; }
  .session-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 6px;
    background: var(--bg); border: 1px solid var(--border);
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
  }
  .session-item:active { background: #1a0a08; border-color: var(--red-dim); }
  .session-item.active { border-color: var(--red); background: #1a0a08; }
  .session-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    background: var(--text-muted);
  }
  .session-item.active .session-dot { background: var(--red-glow); box-shadow: 0 0 4px var(--red-glow); }
  .session-name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-kill {
    background: none; border: none; color: var(--text-muted); font-size: 14px;
    cursor: pointer; padding: 0 2px; border-radius: 3px;
    transition: color 0.15s;
  }
  .session-kill:active { color: var(--red-glow); }

  /* Tmux shortcuts */
  .shortcut-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
  }
  .shortcut-grid .btn { font-size: 10px; padding: 7px 5px; text-align: center; }

  /* Drawer footer */
  #drawer-footer {
    margin-top: auto;
    padding: 10px 14px;
    border-top: 1px solid var(--border);
  }
  #drawer-footer p { font-size: 9px; color: var(--text-muted); line-height: 1.6; }

  /* ── TERMINAL AREA ── */
  #terminal-wrap {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    bottom: var(--keys-h);
    overflow: hidden;
    background: #0c0c0c;
  }
  #terminal {
    width: 100%; height: 100%;
    padding: 4px;
  }
  .xterm { height: 100% !important; }
  .xterm-viewport { background: transparent !important; }
  .xterm-screen { background: transparent !important; }

  /* ── MOBILE KEYS BAR ── */
  #keys-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 90;
    height: var(--keys-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 6px;
    gap: 4px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #keys-bar::-webkit-scrollbar { display: none; }

  .key {
    flex-shrink: 0;
    min-width: 44px; height: 36px;
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 600;
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s, border-color 0.1s, box-shadow 0.1s;
    user-select: none; -webkit-user-select: none;
    padding: 0 8px;
  }
  .key:active { background: #1e0a08; border-color: var(--red-dim); }

  .key.modifier { min-width: 52px; color: var(--text-muted); }
  .key.modifier.active {
    background: var(--red-dim); border-color: var(--red-glow);
    color: var(--text); box-shadow: 0 0 8px rgba(192,57,43,0.5);
  }
  .key.tmux-prefix { border-color: var(--red-dim); color: var(--red-glow); }

  .key-sep {
    flex-shrink: 0; width: 1px; height: 24px;
    background: var(--border); margin: 0 2px;
  }

  /* ── RECONNECTING OVERLAY ── */
  #reconnect-banner {
    position: fixed; bottom: calc(var(--keys-h) + 8px); left: 50%; transform: translateX(-50%);
    background: #1a0a08; border: 1px solid var(--red-dim);
    color: var(--text); font-size: 11px; padding: 6px 14px; border-radius: 20px;
    z-index: 150; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  #reconnect-banner.show { opacity: 1; }

  /* ── SAFE AREA (iPhone notch) ── */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    #keys-bar { padding-bottom: calc(4px + env(safe-area-inset-bottom)); height: calc(var(--keys-h) + env(safe-area-inset-bottom)); }
    #terminal-wrap { bottom: calc(var(--keys-h) + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div id="header">
  <button id="hamburger" onclick="toggleDrawer()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div id="header-title"><span>AUREX</span> TERMINAL</div>
  <div id="session-badge">main</div>
  <div id="conn-dot"></div>
</div>

<!-- ── OVERLAY ── -->
<div id="overlay" onclick="closeDrawer()"></div>

<!-- ── DRAWER ── -->
<div id="drawer">
  <div id="drawer-header">
    <h2>Sessions</h2>
    <p>tmux session manager</p>
  </div>

  <div class="drawer-section">
    <div class="drawer-section-label">New Session</div>
    <div class="input-row">
      <input id="new-session-name" type="text" placeholder="session name" maxlength="32"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn" onclick="newSession()">NEW</button>
    </div>
  </div>

  <div class="drawer-section" style="flex:1; overflow-y:auto;">
    <div class="drawer-section-label" style="display:flex;align-items:center;justify-content:space-between;">
      <span>Active Sessions</span>
      <button class="btn ghost" style="font-size:9px;padding:3px 7px;" onclick="refreshSessions()">↺ REFRESH</button>
    </div>
    <div id="session-list">
      <div style="font-size:11px;color:var(--text-muted);padding:8px 4px;">
        Press REFRESH or run <code style="color:var(--red-glow)">tmux ls</code> to list sessions
      </div>
    </div>
  </div>

  <div class="drawer-section">
    <div class="drawer-section-label">Tmux Shortcuts</div>
    <div class="shortcut-grid">
      <button class="btn ghost" onclick="sendTmux('new-window')">⊞ New Window</button>
      <button class="btn ghost" onclick="sendTmux('split-window -h')">⬜ Split H</button>
      <button class="btn ghost" onclick="sendTmux('split-window -v')">▬ Split V</button>
      <button class="btn ghost" onclick="sendTmux('next-window')">→ Next Win</button>
      <button class="btn ghost" onclick="sendTmux('prev-window')">← Prev Win</button>
      <button class="btn ghost" onclick="sendTmux('kill-window')">✕ Kill Win</button>
    </div>
  </div>

  <div id="drawer-footer">
    <p>Tip: Swipe right to open drawer.<br>
       CTRL key stays active until next keypress.<br>
       <span style="color:var(--red-glow)">⌨ B</span> = send tmux prefix (Ctrl+B).</p>
  </div>
</div>

<!-- ── TERMINAL ── -->
<div id="terminal-wrap">
  <div id="terminal"></div>
</div>

<!-- ── RECONNECT BANNER ── -->
<div id="reconnect-banner">⟳ Reconnecting…</div>

<!-- ── KEYS BAR ── -->
<div id="keys-bar">
  <button class="key modifier" id="ctrl-key"  onclick="toggleMod('ctrl')">CTRL</button>
  <button class="key modifier" id="alt-key"   onclick="toggleMod('alt')">ALT</button>
  <button class="key"          onclick="sendSpecial('escape')">ESC</button>
  <button class="key"          onclick="sendSpecial('tab')">TAB</button>
  <div class="key-sep"></div>
  <button class="key"          onclick="sendSpecial('up')">↑</button>
  <button class="key"          onclick="sendSpecial('down')">↓</button>
  <button class="key"          onclick="sendSpecial('left')">←</button>
  <button class="key"          onclick="sendSpecial('right')">→</button>
  <div class="key-sep"></div>
  <button class="key"          onclick="sendSpecial('home')">HOME</button>
  <button class="key"          onclick="sendSpecial('end')">END</button>
  <button class="key"          onclick="sendSpecial('pgup')">PgUp</button>
  <button class="key"          onclick="sendSpecial('pgdn')">PgDn</button>
  <div class="key-sep"></div>
  <button class="key tmux-prefix" onclick="sendTmuxPrefix()">⌨ B</button>
  <button class="key"          onclick="sendRaw('\x03')">Ctrl+C</button>
  <button class="key"          onclick="sendRaw('\x04')">Ctrl+D</button>
  <button class="key"          onclick="sendRaw('\x0c')">Ctrl+L</button>
  <button class="key"          onclick="sendRaw('\x1a')">Ctrl+Z</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.8.0/lib/addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.9.0/lib/addon-web-links.js"></script>
<script>
/* ── STATE ── */
let ws = null;
let term = null;
let fitAddon = null;
let reconnectTimer = null;
let modifiers = { ctrl: false, alt: false };
let currentSession = 'main';
let drawerOpen = false;

/* ── TERMINAL INIT ── */
function initTerminal() {
  term = new Terminal({
    fontFamily: '"JetBrains Mono", "Cascadia Code", monospace',
    fontSize: 13,
    lineHeight: 1.2,
    cursorBlink: true,
    cursorStyle: 'block',
    allowTransparency: true,
    scrollback: 5000,
    theme: {
      background:   '#0c0c0c',
      foreground:   '#e8e0dc',
      cursor:       '#e74c3c',
      cursorAccent: '#0c0c0c',
      selectionBackground: 'rgba(192,57,43,0.3)',
      black:        '#1a1a1a',
      red:          '#c0392b',
      green:        '#27ae60',
      yellow:       '#f39c12',
      blue:         '#2980b9',
      magenta:      '#8e44ad',
      cyan:         '#16a085',
      white:        '#e8e0dc',
      brightBlack:  '#4a4a4a',
      brightRed:    '#e74c3c',
      brightGreen:  '#2ecc71',
      brightYellow: '#f1c40f',
      brightBlue:   '#3498db',
      brightMagenta:'#9b59b6',
      brightCyan:   '#1abc9c',
      brightWhite:  '#ffffff',
    }
  });

  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.loadAddon(new WebLinksAddon.WebLinksAddon());
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  term.onData(data => {
    if (modifiers.ctrl || modifiers.alt) {
      // Apply modifier to each char
      let out = '';
      for (let i = 0; i < data.length; i++) {
        let ch = data[i];
        if (modifiers.ctrl) {
          const code = ch.toUpperCase().charCodeAt(0);
          if (code >= 64 && code <= 95) {
            out += String.fromCharCode(code - 64);
          } else {
            out += ch;
          }
        } else if (modifiers.alt) {
          out += '\x1b' + ch;
        }
      }
      wsSend(out);
      clearModifiers();
    } else {
      wsSend(data);
    }
  });

  term.onResize(({ cols, rows }) => {
    wsSendResize(cols, rows);
  });

  window.addEventListener('resize', () => fitAddon.fit());
}

/* ── WEBSOCKET ── */
async function connect() {
  setStatus('');
  const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';

  // Try to get ttyd auth token
  let token = '';
  try {
    const r = await fetch('/token');
    if (r.ok) { const d = await r.json(); token = d.token || ''; }
  } catch (_) {}

  const url = `${wsProto}//${location.host}/ws` + (token ? `?token=${encodeURIComponent(token)}` : '');
  ws = new WebSocket(url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    if (token) ws.send(JSON.stringify({ AuthToken: token }));
    wsSendResize(term.cols, term.rows);
    setStatus('connected');
    hideBanner();
    term.focus();
  };

  ws.onmessage = (ev) => {
    const buf = new Uint8Array(ev.data);
    const cmd = buf[0];
    const payload = buf.slice(1);
    if (cmd === 48) { // '0' output
      term.write(payload);
    } else if (cmd === 49) { // '1' title
      try {
        const t = JSON.parse(new TextDecoder().decode(payload));
        if (typeof t === 'string' && t) {
          document.title = t + ' — Aurex Terminal';
          // Extract tmux session name if possible
          const m = t.match(/\[([^\]]+)\]/);
          if (m) updateSessionBadge(m[1]);
        }
      } catch (_) {}
    }
    // cmd 50 = preferences, ignore
  };

  ws.onclose = () => {
    setStatus('error');
    showBanner();
    reconnectTimer = setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setStatus('error');
  };
}

function wsSend(data) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const enc = new TextEncoder();
  const bytes = enc.encode('0' + data);
  ws.send(bytes);
}

function wsSendResize(cols, rows) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send('1' + JSON.stringify({ columns: cols, rows: rows }));
}

/* ── RAW SEND ── */
function sendRaw(seq) { wsSend(seq); term.focus(); }

/* ── SPECIAL KEYS ── */
const SPECIAL_SEQS = {
  escape: '\x1b',
  tab:    '\t',
  up:     '\x1b[A',
  down:   '\x1b[B',
  right:  '\x1b[C',
  left:   '\x1b[D',
  home:   '\x1b[H',
  end:    '\x1b[F',
  pgup:   '\x1b[5~',
  pgdn:   '\x1b[6~',
};

function sendSpecial(key) {
  let seq = SPECIAL_SEQS[key];
  if (!seq) return;
  if (modifiers.alt) { seq = '\x1b' + seq; clearModifiers(); }
  wsSend(seq);
  term.focus();
}

/* ── TMUX PREFIX Ctrl+B ── */
function sendTmuxPrefix() {
  wsSend('\x02'); // Ctrl+B
  term.focus();
}

/* ── TMUX COMMANDS via prefix ── */
function sendTmux(cmd) {
  // Send Ctrl+B : <cmd> Enter
  wsSend('\x02:' + cmd + '\r');
  closeDrawer();
  term.focus();
}

/* ── SESSION MANAGEMENT ── */
function newSession() {
  const inp = document.getElementById('new-session-name');
  const name = inp.value.trim().replace(/[^a-zA-Z0-9_-]/g, '') || 'sess' + Date.now().toString(36);
  inp.value = '';
  // Create new session and switch to it via tmux commands
  wsSend('\x02:new-session -d -s ' + name + '\r');
  setTimeout(() => {
    wsSend('\x02:switch-client -t ' + name + '\r');
    updateSessionBadge(name);
  }, 300);
  closeDrawer();
  term.focus();
}

function refreshSessions() {
  // Run tmux ls in terminal so user sees output
  wsSend('tmux ls\r');
  closeDrawer();
  term.focus();
  // Also try to parse via a detached approach (best-effort)
  setTimeout(fetchSessions, 800);
}

// Best-effort: try to GET a session list endpoint if Flask is running
async function fetchSessions() {
  try {
    const r = await fetch('/api/sessions');
    if (!r.ok) return;
    const sessions = await r.json();
    renderSessions(sessions);
  } catch (_) {
    // No API available, that's fine
  }
}

function renderSessions(sessions) {
  const list = document.getElementById('session-list');
  if (!sessions || sessions.length === 0) {
    list.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:8px 4px;">No sessions found</div>';
    return;
  }
  list.innerHTML = '';
  sessions.forEach(s => {
    const name = typeof s === 'string' ? s : s.name;
    const active = name === currentSession;
    const item = document.createElement('div');
    item.className = 'session-item' + (active ? ' active' : '');
    item.innerHTML = `
      <span class="session-dot"></span>
      <span class="session-name">${escHtml(name)}</span>
      <button class="session-kill" onclick="killSession('${escHtml(name)}',event)" title="Kill session">✕</button>
    `;
    item.addEventListener('click', () => switchSession(name));
    list.appendChild(item);
  });
}

function switchSession(name) {
  wsSend('\x02:switch-client -t ' + name + '\r');
  updateSessionBadge(name);
  closeDrawer();
  term.focus();
}

function killSession(name, ev) {
  ev.stopPropagation();
  if (!confirm('Kill session "' + name + '"?')) return;
  wsSend('\x02:kill-session -t ' + name + '\r');
  setTimeout(fetchSessions, 500);
}

/* ── MODIFIERS ── */
function toggleMod(mod) {
  modifiers[mod] = !modifiers[mod];
  document.getElementById(mod + '-key').classList.toggle('active', modifiers[mod]);
}

function clearModifiers() {
  modifiers.ctrl = false;
  modifiers.alt  = false;
  document.getElementById('ctrl-key').classList.remove('active');
  document.getElementById('alt-key').classList.remove('active');
}

/* ── DRAWER ── */
function toggleDrawer() {
  drawerOpen ? closeDrawer() : openDrawer();
}
function openDrawer() {
  drawerOpen = true;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  document.getElementById('hamburger').classList.add('open');
}
function closeDrawer() {
  drawerOpen = false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('hamburger').classList.remove('open');
}

// Swipe-right to open drawer
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (touchStartX < 30 && dx > 60 && !drawerOpen) openDrawer();
  if (dx < -60 && drawerOpen) closeDrawer();
}, { passive: true });

/* ── HELPERS ── */
function setStatus(s) {
  const dot = document.getElementById('conn-dot');
  dot.className = s;
}
function updateSessionBadge(name) {
  currentSession = name;
  document.getElementById('session-badge').textContent = name;
}
function showBanner() { document.getElementById('reconnect-banner').classList.add('show'); }
function hideBanner() { document.getElementById('reconnect-banner').classList.remove('show'); }
function escHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Handle Enter in new-session input
document.getElementById('new-session-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') newSession();
});

/* ── BOOT ── */
initTerminal();
connect();
</script>
</body>
</html>
